services:
  api:
    build:
      context: ./apps/api
    image: aegis-api:latest
    container_name: aegis-api
    ports:
      - "8000:8000"
    environment:
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
      OLLAMA_HOST: http://ollama:11434
      VLM_MODE: ${VLM_MODE:-zai}
      VLM_MODEL: ${VLM_MODEL:-glm-4v}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-https://api.z.ai/api/paas/v4}
      FRAME_INTERVAL_SECONDS: ${FRAME_INTERVAL_SECONDS:-2}
    volumes:
      - api-data:/data
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: aegis-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # Uncomment to enable GPU (requires NVIDIA Container Toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  api-data:
  ollama-data:
